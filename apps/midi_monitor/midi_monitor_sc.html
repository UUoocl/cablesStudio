<!DOCTYPE html>
<html>
<head>
    <title>MIDI Monitor (SocketCluster)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; margin: 0; }
        #container { max-width: 800px; margin: 0 auto; }
        h1 { color: #569cd6; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #status-bar { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; font-size: 0.9em; }
        #controls { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #1177bb; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }

        #messages { 
            background: #252526; 
            border: 1px solid #444; 
            border-radius: 4px;
            padding: 10px; 
            height: 60vh; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column-reverse;
        }
        .msg { 
            margin-bottom: 8px; 
            border-bottom: 1px solid #333; 
            padding: 8px;
            animation: fadeIn 0.3s ease-out;
        }
        .meta { color: #888; font-size: 0.85em; margin-bottom: 4px; }
        .topic { color: #569cd6; font-weight: bold; margin-right: 8px; }
        .type { color: #ce9178; font-weight: bold; }
        .details { color: #b5cea8; }
        .raw-data { font-family: monospace; color: #888; font-size: 0.9em; margin-top: 4px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 2px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-hint { color: #f44747; font-size: 0.9em; margin-left: 10px; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #555;
        }
        .status-dot.connected { background: #4ec9b0; box-shadow: 0 0 5px #4ec9b0; }
        #sc-status { color: #888; }
    </style>
    <script src="lib/socketcluster.js"></script>
</head>
<body>
    <div id="container">
        <h1 id="title">MIDI Monitor SC</h1>
        
        <div id="status-bar">
            <span><span id="sc-dot" class="status-dot"></span> SC: <span id="sc-status">Connecting...</span></span>
            <span id="channel-info"></span>
        </div>

        <div id="controls">
            <button id="noteOnBtn">Send Note On (C3, ch1)</button>
            <button id="noteOffBtn">Send Note Off (C3, ch1)</button>
            <button id="ccBtn">Send CC (Ctrl 1, Val 127, ch1)</button>
            <span id="hint" class="error-hint"></span>
        </div>

        <div id="messages"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const inChannel = urlParams.get('inChannel');
        const outChannel = urlParams.get('outChannel');
        
        const scStatusEl = document.getElementById('sc-status');
        const scDot = document.getElementById('sc-dot');
        const channelInfoEl = document.getElementById('channel-info');
        const messagesEl = document.getElementById('messages');
        const titleEl = document.getElementById('title');
        const hintEl = document.getElementById('hint');

        const buttons = {
            noteOn: document.getElementById('noteOnBtn'),
            noteOff: document.getElementById('noteOffBtn'),
            cc: document.getElementById('ccBtn')
        };

        let socket = null;
        let isProcessingInbound = false;

        if (inChannel || outChannel) {
            let labels = [];
            if (inChannel) labels.push(`In: ${inChannel}`);
            if (outChannel) labels.push(`Out: ${outChannel}`);
            
            titleEl.textContent = `MIDI Monitor SC (${labels.join(', ')})`;
            channelInfoEl.textContent = `| ${labels.join(', ')}`;
            
            if (!outChannel) {
                Object.values(buttons).forEach(btn => btn.disabled = true);
                hintEl.textContent = "Specify ?outChannel=... to enable sending";
            }
        } else {
            titleEl.textContent = `MIDI Monitor SC: (No Channels)`;
            Object.values(buttons).forEach(btn => btn.disabled = true);
            hintEl.textContent = "Specify ?inChannel=... & ?outChannel=... in URL";
            scStatusEl.textContent = 'Channels required';
        }

        // SocketCluster Setup
        const options = {
            hostname: '127.0.0.1',
            port: 8000,
            path: '/socketcluster/'
        };
        socket = socketClusterClient.create(options);

        (async () => {
            for await (let {error} of socket.listener('error')) {
                console.error('SocketCluster error:', error);
                scStatusEl.textContent = 'Error';
                scStatusEl.style.color = '#f44747';
            }
        })();

        (async () => {
            for await (let event of socket.listener('connect')) {
                console.log('Connected to SocketCluster');
                scStatusEl.textContent = 'Connected';
                scStatusEl.style.color = '#4ec9b0';
                scDot.classList.add('connected');
                
                if (inChannel && !isProcessingInbound) {
                    subscribeToChannel();
                }
            }
        })();

        (async () => {
            for await (let event of socket.listener('disconnect')) {
                console.log('Disconnected from SocketCluster');
                scStatusEl.textContent = 'Disconnected';
                scStatusEl.style.color = '#ce9178';
                scDot.classList.remove('connected');
            }
        })();

        async function subscribeToChannel() {
            isProcessingInbound = true;
            try {
                const fullChannelName = `${inChannel}/objects`;
                console.log(`Subscribing to ${fullChannelName}`);
                const scChannel = socket.subscribe(fullChannelName);
                
                for await (let data of scChannel) {
                    addMessage(data);
                }
            } catch (e) {
                console.error('Subscription error:', e);
                isProcessingInbound = false;
            }
        }

        function sendMidi(payload) {
            if (socket.state !== 'open') {
                alert('SocketCluster not connected');
                return;
            }
            if (!outChannel) {
                alert('No outChannel specified');
                return;
            }
            try {
                socket.transmitPublish(`${outChannel}/objects`, {
                    topic: 'midi_send',
                    clientId: socket.clientId,
                    payload: payload
                });
            } catch (e) {
                console.error('Socket publish error:', e);
                alert('Failed to send MIDI message');
            }
        }

        buttons.noteOn.onclick = () => sendMidi({ type: 'noteon', note: 60, velocity: 0.8, channel: 1 });
        buttons.noteOff.onclick = () => sendMidi({ type: 'noteoff', note: 60, channel: 1 });
        buttons.cc.onclick = () => sendMidi({ type: 'controlchange', controller: 1, value: 127, channel: 1 });

        function decodeStatus(status) {
            if (status >= 144 && status <= 159) return { type: 'NOTE ON', channel: (status - 144) + 1 };
            if (status >= 128 && status <= 143) return { type: 'NOTE OFF', channel: (status - 128) + 1 };
            if (status >= 176 && status <= 191) return { type: 'CC', channel: (status - 176) + 1 };
            return { type: `STATUS ${status}`, channel: '?' };
        }

        function addMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg';

            const meta = document.createElement('div');
            meta.className = 'meta';
            const timestamp = new Date().toLocaleTimeString();
            meta.textContent = `${timestamp} - Client: ${data.clientId || 'unknown'}`;

            const content = document.createElement('div');
            
            const topicSpan = document.createElement('span');
            topicSpan.className = 'topic';
            topicSpan.textContent = `[${data.topic || 'no-topic'}]`;
            content.appendChild(topicSpan);

            // Robust Payload Parsing
            let msg = data.payload || data;
            let displayType = '';
            let details = '';
            let isMidi = false;

            // 1. Check for standard object schema {type, note, ...}
            if (msg && msg.type) {
                isMidi = true;
                displayType = String(msg.type).toUpperCase();
                details = `(Ch: ${msg.channel || 1})`;
                if (msg.note !== undefined && msg.note !== null) details += ` Note: ${msg.note}, Vel: ${msg.velocity}`;
                if (msg.controller !== undefined) details += ` CC: ${msg.controller}, Val: ${msg.value}`;
            } 
            // 2. Check for byte-array schema [status, d1, d2]
            else if (Array.isArray(msg) && msg.length >= 3) {
                isMidi = true;
                const decoded = decodeStatus(msg[0]);
                displayType = decoded.type;
                details = `(Ch: ${decoded.channel}) Data: ${msg[1]}, ${msg[2]}`;
            }
            // 3. Check for status/data object schema {status, data1, data2}
            else if (msg && msg.status !== undefined) {
                isMidi = true;
                const decoded = decodeStatus(msg.status);
                displayType = decoded.type;
                details = `(Ch: ${decoded.channel}) Data: ${msg.data1 || msg.note || '?'}, ${msg.data2 || msg.velocity || msg.value || '?'}`;
            }

            if (isMidi) {
                const typeSpan = document.createElement('span');
                typeSpan.className = 'type';
                typeSpan.textContent = displayType;

                const detailsSpan = document.createElement('span');
                detailsSpan.className = 'details';
                detailsSpan.textContent = ' ' + details;

                content.appendChild(typeSpan);
                content.appendChild(detailsSpan);
            } else {
                // Show raw data for debugging unrecognized schemas
                const rawDiv = document.createElement('div');
                rawDiv.className = 'raw-data';
                rawDiv.textContent = typeof msg === 'object' ? JSON.stringify(msg) : String(msg);
                content.appendChild(rawDiv);
            }

            div.appendChild(meta);
            div.appendChild(content);
            messagesEl.appendChild(div);

            while (messagesEl.children.length > 100) {
                messagesEl.removeChild(messagesEl.firstChild);
            }
        }
    </script>
</body>
</html>
