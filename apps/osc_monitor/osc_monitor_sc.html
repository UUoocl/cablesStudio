<!DOCTYPE html>
<html>
<head>
    <title>OSC Monitor (SocketCluster)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; margin: 0; }
        #container { max-width: 800px; margin: 0 auto; }
        h1 { color: #569cd6; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #status-bar { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; font-size: 0.9em; }
        #controls { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #1177bb; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        button.on { background: #4ec9b0; color: #1e1e1e; }
        
        #messages { 
            background: #252526; 
            border: 1px solid #444; 
            border-radius: 4px;
            padding: 10px; 
            height: 60vh; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column-reverse;
        }
        .msg { 
            margin-bottom: 8px; 
            border-bottom: 1px solid #333; 
            padding: 8px;
            animation: fadeIn 0.3s ease-out;
        }
        .meta { color: #888; font-size: 0.85em; margin-bottom: 4px; }
        .topic { color: #569cd6; font-weight: bold; margin-right: 8px; }
        .address { color: #ce9178; font-weight: bold; }
        .args { color: #b5cea8; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-hint { color: #f44747; font-size: 0.9em; margin-left: 10px; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #555;
        }
        .status-dot.connected { background: #4ec9b0; box-shadow: 0 0 5px #4ec9b0; }
        #sc-status { color: #888; }
    </style>
    <script src="lib/socketcluster.js"></script>
</head>
<body>
    <div id="container">
        <h1 id="title">OSC Monitor SC</h1>
        
        <div id="status-bar">
            <span><span id="sc-dot" class="status-dot"></span> SC: <span id="sc-status">Connecting...</span></span>
            <span id="channel-info"></span>
        </div>
        
        <div id="controls">
            <button id="toggleBtn">Toggle OSC (/4/toggle1)</button>
            <span id="hint" class="error-hint"></span>
        </div>

        <div id="messages"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const inChannel = urlParams.get('inChannel');
        const outChannel = urlParams.get('outChannel');
        const scStatusEl = document.getElementById('sc-status');
        const scDot = document.getElementById('sc-dot');
        const channelInfoEl = document.getElementById('channel-info');
        const messagesEl = document.getElementById('messages');
        const titleEl = document.getElementById('title');
        const toggleBtn = document.getElementById('toggleBtn');
        const hintEl = document.getElementById('hint');

        let isOn = false;

        if (inChannel || outChannel) {
            let labels = [];
            if (inChannel) labels.push(`In: ${inChannel}`);
            if (outChannel) labels.push(`Out: ${outChannel}`);
            
            titleEl.textContent = `OSC Monitor SC (${labels.join(', ')})`;
            channelInfoEl.textContent = `| ${labels.join(', ')}`;
            
            if (!outChannel) {
                toggleBtn.disabled = true;
                hintEl.textContent = "Specify ?outChannel=... to enable sending";
            }
            if (!inChannel) {
                if (!hintEl.textContent) {
                    hintEl.textContent = "Specify ?inChannel=... to enable monitoring";
                }
            }
        } else {
            titleEl.textContent = `OSC Monitor SC: (No Channels)`;
            toggleBtn.disabled = true;
            hintEl.textContent = "Specify ?inChannel=... & ?outChannel=... in URL";
            scStatusEl.textContent = 'Channels required';
        }

        // SocketCluster Setup
        const options = {
            hostname: window.location.hostname || '127.0.0.1',
            port: 8000,
            path: '/socketcluster/'
        };
        const socket = socketClusterClient.create(options);

        (async () => {
            for await (let event of socket.listener('connect')) {
                scStatusEl.textContent = 'Connected';
                scStatusEl.style.color = '#4ec9b0';
                scDot.classList.add('connected');
                
                if (inChannel) {
                    subscribeToChannel();
                }
            }
        })();

        (async () => {
            for await (let event of socket.listener('disconnect')) {
                scStatusEl.textContent = 'Disconnected';
                scStatusEl.style.color = '#ce9178';
                scDot.classList.remove('connected');
            }
        })();

        async function subscribeToChannel() {
            try {
                // Compatible with Cables SC ops: Channel + "/objects"
                const scChannel = socket.subscribe(`${inChannel}/objects`);
                for await (let data of scChannel) {
                    // data: { topic: string, clientId: string, payload: object }
                    addMessage(data);
                }
            } catch (e) {
                console.error('Subscription error:', e);
            }
        }

        // --- Toggle Logic ---
        toggleBtn.onclick = () => {
            if (socket.state !== 'open') {
                alert('SocketCluster not connected');
                return;
            }
            
            if (!outChannel) {
                alert('No outChannel specified');
                return;
            }
            
            const nextState = !isOn;
            const val = nextState ? 1 : 0;
            
            try {
                // Compatible with Cables SC ops: publish to Channel + "/objects"
                socket.transmitPublish(`${outChannel}/objects`, {
                    topic: 'osc_send',
                    clientId: socket.clientId,
                    payload: {
                        address: '/4/toggle1',
                        args: [val]
                    }
                });
                
                isOn = nextState;
                toggleBtn.classList.toggle('on', isOn);
                toggleBtn.textContent = `Toggle OSC: ${isOn ? 'ON' : 'OFF'}`;
            } catch (e) {
                console.error('Socket publish error:', e);
                alert('Failed to send OSC message');
            }
        };

        function addMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            
            const meta = document.createElement('div');
            meta.className = 'meta';
            const timestamp = new Date().toLocaleTimeString();
            meta.textContent = `${timestamp} - Client: ${data.clientId || 'unknown'}`;
            
            const content = document.createElement('div');
            
            const topicSpan = document.createElement('span');
            topicSpan.className = 'topic';
            topicSpan.textContent = `[${data.topic || 'no-topic'}]`;
            
            const payload = data.payload || {};
            const address = payload.address || 'unknown';
            const args = payload.args || [];
            
            const addrSpan = document.createElement('span');
            addrSpan.className = 'address';
            addrSpan.textContent = address;
            
            const argsSpan = document.createElement('span');
            argsSpan.className = 'args';
            argsSpan.textContent = args.length > 0 ? ' ' + JSON.stringify(args) : '';
            
            content.appendChild(topicSpan);
            content.appendChild(addrSpan);
            content.appendChild(argsSpan);
            
            div.appendChild(meta);
            div.appendChild(content);
            
            messagesEl.appendChild(div);
            
            // Limit message count
            while (messagesEl.children.length > 100) {
                messagesEl.removeChild(messagesEl.firstChild);
            }
        }
    </script>
</body>
</html>
