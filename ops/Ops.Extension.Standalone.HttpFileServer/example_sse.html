<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cables SSE Client Example</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #eee;
            padding: 20px;
            line-height: 1.6;
        }
        #log {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
        }
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }
        .connected { background: #1b5e20; color: #fff; }
        .disconnected { background: #b71c1c; color: #fff; }
        .message { color: #81d4fa; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .timestamp { color: #666; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Cables Standalone SSE Client</h1>
    <div id="status-tag" class="status disconnected">Disconnected</div>
    
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        const statusTag = document.getElementById('status-tag');
        
        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function connect() {
            addLog('Connecting to /events...');
            
            // Use current host/port
            const evtSource = new EventSource('/events');

            evtSource.onopen = () => {
                statusTag.innerText = 'Connected';
                statusTag.className = 'status connected';
                addLog('SSE Connection established.');
            };

            evtSource.onerror = (err) => {
                statusTag.innerText = 'Disconnected';
                statusTag.className = 'status disconnected';
                addLog('SSE Error/Disconnected. Attempting reconnect...', 'error');
            };

            // Listen for default 'message' event
            evtSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addLog('Received message: ' + JSON.stringify(data));
                } catch (e) {
                    addLog('Received raw: ' + event.data);
                }
            };

            // Listen for custom named events if needed
            // You can add more listeners here:
            // evtSource.addEventListener('update', (e) => { ... });
        }

        connect();
    </script>
</body>
</html>
