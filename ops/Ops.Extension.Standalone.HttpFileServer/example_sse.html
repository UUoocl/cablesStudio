<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cables SSE Client Example</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #eee;
            padding: 20px;
            line-height: 1.6;
        }
        #log {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            text-transform: none;
        }
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }
        .connected { background: #1b5e20; color: #fff; }
        .disconnected { background: #b71c1c; color: #fff; }
        .message { color: #81d4fa; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .timestamp { color: #666; margin-right: 10px; }
        .filter-container { margin-top: 20px; background: #222; padding: 10px; border-radius: 4px; border: 1px solid #333; }
        input { background: #333; color: #fff; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Cables Standalone SSE Client</h1>
    <div id="status-tag" class="status disconnected">Disconnected</div>
    
    <div class="filter-container">
        <label for="route-input">SSE Route:</label>
        <input type="text" id="route-input" placeholder="/sse" value="/sse">
        <button id="connect-btn" style="background: #333; color: #fff; border: 1px solid #555; cursor: pointer; padding: 5px 10px; border-radius: 4px;">Connect</button>
    </div>
    
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        const statusTag = document.getElementById('status-tag');
        
        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        let evtSource = null;

        function connect() {
            const route = document.getElementById('route-input').value.trim() || '/sse';
            if (evtSource) evtSource.close();

            addLog(`Connecting to ${route}...`);
            evtSource = new EventSource(route);

            evtSource.onopen = () => {
                statusTag.innerText = 'Connected';
                statusTag.className = 'status connected';
                addLog(`SSE Connection established on ${route}.`);
            };

            evtSource.onerror = (err) => {
                statusTag.innerText = 'Disconnected';
                statusTag.className = 'status disconnected';
                addLog('SSE Error/Disconnected.', 'error');
            };

            // Listen for default 'message' event
            evtSource.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    const route = payload.route || 'unknown';
                    const eventName = payload.eventName || 'message';
                    const data = payload.data || payload;
                    
                    addLog(`<b>[${route}]</b> ${eventName}: ${JSON.stringify(data)}`);
                } catch (e) {
                    addLog('Received raw: ' + event.data);
                }
            };
        }

        document.getElementById('connect-btn').addEventListener('click', connect);
        connect();
    </script>
</body>
</html>
