<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js OffscreenCanvas Example</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; }
    </style>
</head>
<body>
    <script>
        let offscreenCanvas = null;
        let bc = null;
        
        // Sketch settings that can be updated via BroadcastChannel
        let sketchSettings = {
            bgR: 30, bgG: 30, bgB: 40,
            speed: 0.05,
            rectSize: 150
        };

        // Check for broadcast channel in query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const channelName = urlParams.get('channel');
        
        if (channelName) {
            bc = new BroadcastChannel(channelName);
            bc.onmessage = (event) => {
                const data = event.data;
                // Cables will likely send an object with properties we can merge
                if (data && typeof data === 'object') {
                    if (data.bgR !== undefined) sketchSettings.bgR = data.bgR;
                    if (data.bgG !== undefined) sketchSettings.bgG = data.bgG;
                    if (data.bgB !== undefined) sketchSettings.bgB = data.bgB;
                    if (data.speed !== undefined) sketchSettings.speed = data.speed;
                    if (data.rectSize !== undefined) sketchSettings.rectSize = data.rectSize;
                }
            };
            console.log("Listening for sketch settings on BroadcastChannel:", channelName);
        }

        // Listen for the postMessage from the Cables Op (TransferCanvasControl)
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'init_canvas') {
                offscreenCanvas = event.data.canvas;
                
                // Now load p5.js so it runs setup() in global mode
                // We load it dynamically to ensure we have the canvas reference BEFORE p5 initializes
                let script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js";
                document.head.appendChild(script);
            }
        });

        // The p5 setup function (Global Mode)
        function setup() {
            // Use the reference in the p5 createCanvas function
            createCanvas(offscreenCanvas.width, offscreenCanvas.height, P2D, offscreenCanvas);
        }

        function draw() {
            // Use dynamic settings
            background(sketchSettings.bgR, sketchSettings.bgG, sketchSettings.bgB);
            
            // Draw a spinning, color-changing rectangle
            push();
            translate(width / 2, height / 2);
            rotate(frameCount * sketchSettings.speed);
            fill(sin(frameCount * 0.02) * 127 + 128, 100, 200);
            noStroke();
            rectMode(CENTER);
            rect(0, 0, sketchSettings.rectSize + sin(frameCount * 0.1) * 50, sketchSettings.rectSize + cos(frameCount * 0.1) * 50);
            pop();

            // Draw some floating circles
            fill(255, 150);
            ellipse((frameCount * 2) % width, height / 2 + sin(frameCount * sketchSettings.speed) * 100, 30, 30);
            ellipse((frameCount * 3) % width, height / 2 + cos(frameCount * sketchSettings.speed * 0.6) * 80, 20, 20);
        }
    </script>
</body>
</html>
